steps:
  # Install dependencies
  - name: 'Install dependencies'
    entrypoint: 'npm'
    args: ['install']
    dir: 'backend'

  # Build the backend (if needed)
  # - name: 'Build backend'
  #   entrypoint: 'npm'
  #   args: ['run', 'build']
  #   dir: 'backend'

  # Run tests (optional)
  # - name: 'Run tests'
  #   entrypoint: 'npm'
  #   args: ['test']
  #   dir: 'backend'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/backend', '.']
    dir: 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/backend']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      [
        'run', 'deploy', 'backend',
        '--image', 'gcr.io/$PROJECT_ID/backend',
        '--region', 'us-central1',
        '--platform', 'managed',
        '--allow-unauthenticated',
        '--set-env-vars', 'JWT_SECRET=your_secret_here,MONGO_URI=your_mongo_uri_here'
      ]
